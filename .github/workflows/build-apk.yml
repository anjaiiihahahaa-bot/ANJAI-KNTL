name: Build WebView APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Nama aplikasi'
        required: true
        default: 'MyApp'
      package_name:
        description: 'Package name (com.xxx.yyy)'
        required: true
        default: 'com.vinzmd.webview'
      url:
        description: 'URL website yang akan di-wrap'
        required: true
        default: 'https://example.com'
      ref_id:
        description: 'Ref ID dari bot (untuk tracking)'
        required: false
        default: ''

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout repo ───────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. JDK 17 ──────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Inject konfigurasi app ──────────────────────────────
      - name: Inject app config
        run: |
          APP_NAME="${{ inputs.app_name }}"
          PKG="${{ inputs.package_name }}"
          URL="${{ inputs.url }}"

          echo "🔧 Nama   : $APP_NAME"
          echo "🔧 Package: $PKG"
          echo "🔧 URL    : $URL"

          # ─ strings.xml: update app_name dan target_url
          cat > app/src/main/res/values/strings.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">$APP_NAME</string>
              <string name="target_url">$URL</string>
          </resources>
          EOF

          # ─ Update package / applicationId di app/build.gradle
          sed -i "s|namespace '.*'|namespace '$PKG'|g"          app/build.gradle
          sed -i "s|applicationId \".*\"|applicationId \"$PKG\"|g" app/build.gradle

          # ─ Update package di MainActivity.java
          sed -i "s|^package .*;|package $PKG;|g" \
            app/src/main/java/com/vinzmd/webview/MainActivity.java

          # ─ Update AndroidManifest namespace jika ada
          sed -i "s|package=\"[^\"]*\"|package=\"$PKG\"|g" \
            app/src/main/AndroidManifest.xml || true

      # ── 4. Pasang icon (jika ada build_icon.png di repo) ───────
      - name: Apply custom icon
        run: |
          if [ -f "build_icon.png" ]; then
            echo "✅ Icon kustom ditemukan, menerapkan..."
            # Install ImageMagick untuk resize
            sudo apt-get install -y imagemagick -qq

            convert build_icon.png -resize 48x48   app/src/main/res/mipmap-mdpi/ic_launcher.png
            convert build_icon.png -resize 72x72   app/src/main/res/mipmap-hdpi/ic_launcher.png
            convert build_icon.png -resize 96x96   app/src/main/res/mipmap-xhdpi/ic_launcher.png
            convert build_icon.png -resize 144x144 app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            convert build_icon.png -resize 192x192 app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

            # Round icon (sama tapi dengan circle mask)
            convert build_icon.png -resize 48x48   app/src/main/res/mipmap-mdpi/ic_launcher_round.png   || true
            convert build_icon.png -resize 72x72   app/src/main/res/mipmap-hdpi/ic_launcher_round.png   || true
            convert build_icon.png -resize 96x96   app/src/main/res/mipmap-xhdpi/ic_launcher_round.png  || true
            convert build_icon.png -resize 144x144 app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png  || true
            convert build_icon.png -resize 192x192 app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png || true

            echo "✅ Icon berhasil dipasang semua ukuran"
          else
            echo "⚠️  build_icon.png tidak ada, pakai icon default"
          fi

      # ── 5. Gradle permission ───────────────────────────────────
      - name: Grant execute permission
        run: chmod +x gradlew

      # ── 6. Build APK (debug, tidak perlu keystore) ─────────────
      - name: Build APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Porg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m"

      # ── 7. Rename APK sesuai nama app ──────────────────────────
      - name: Rename APK
        run: |
          APK_SRC=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          # Sanitize nama: spasi → underscore, lowercase
          SAFE_NAME=$(echo "${{ inputs.app_name }}" | tr ' ' '_' | tr -cd '[:alnum:]_-')
          cp "$APK_SRC" "${SAFE_NAME}.apk"
          APK_SIZE=$(du -sh "${SAFE_NAME}.apk" | cut -f1)
          echo "APK_FILE=${SAFE_NAME}.apk" >> $GITHUB_ENV
          echo "APK_SIZE=${APK_SIZE}"      >> $GITHUB_ENV
          echo "APK_NAME=${SAFE_NAME}"     >> $GITHUB_ENV
          echo ""
          echo "✅ APK siap: ${SAFE_NAME}.apk (${APK_SIZE})"

      # ── 8. Upload artifact ─────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}-apk
          path: ${{ env.APK_FILE }}
          retention-days: 3

      # ── 9. Summary ─────────────────────────────────────────────
      - name: Build Summary
        run: |
          echo "## ✅ Build Selesai!" >> $GITHUB_STEP_SUMMARY
          echo ""                    >> $GITHUB_STEP_SUMMARY
          echo "| Key      | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Nama App | ${{ inputs.app_name }} |"  >> $GITHUB_STEP_SUMMARY
          echo "| Package  | ${{ inputs.package_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| URL      | ${{ inputs.url }} |"       >> $GITHUB_STEP_SUMMARY
          echo "| Ukuran   | ${{ env.APK_SIZE }} |"     >> $GITHUB_STEP_SUMMARY
          echo "| Ref ID   | ${{ inputs.ref_id }} |"    >> $GITHUB_STEP_SUMMARY
